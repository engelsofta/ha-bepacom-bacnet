release_analog_value_priority:
  name: Analog-Value-Priorität freigeben
  description: Gibt einen BACnet-Prioritätseintrag eines Analog Value frei.
  fields:
    config_entry_id:
      name: Verbindung
      description: Engelsoft-Beacon-Verbindung; nur bei mehreren eingerichteten Verbindungen erforderlich.
      required: false
      selector:
        config_entry:
          integration: bepacom
    device_id:
      name: Device-ID
      description: BACnet-Geräte-ID.
      required: true
      default: 1
      selector:
        number:
          min: 0
          mode: box
    object_id:
      name: Object-ID
      description: BACnet Object Instance des Analog Value.
      required: true
      selector:
        number:
          min: 0
          mode: box
    priority:
      name: Priorität
      description: Freizugebende BACnet-Priorität.
      required: true
      default: 8
      selector:
        number:
          min: 1
          max: 16
          mode: box

