name: Publish Pre-release

on:
  push:
    tags:
      - "v*.*.*-beta.*"
      - "v*.*.*-rc.*"

permissions:
  contents: write
  pull-requests: read

jobs:
  publish_prerelease:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pre-release from Release Drafter notes
        id: drafter
        continue-on-error: true
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          publish: true
          prerelease: true
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
      - name: Fallback to GitHub generated release notes
        if: steps.drafter.outcome != 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
